<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Intelligence Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f5f6fa;
    }
    .sidebar {
      width: 240px;
      background-color: #1f2937;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 {
      font-size: 1.2rem;
      padding: 20px;
      margin: 0;
      border-bottom: 1px solid #374151;
    }
    .account-list {
      flex-grow: 1;
      overflow-y: auto;
    }
    .account-list button {
      width: 100%;
      padding: 15px 20px;
      border: none;
      background: none;
      color: #d1d5db;
      text-align: left;
      cursor: pointer;
    }
    .account-list button:hover,
    .account-list button.active {
      background-color: #374151;
      color: #fff;
    }
    .content {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .card h3 {
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table th,
    table td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
    }
    table th {
      text-align: left;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Accounts</h2>
    <div class="account-list" id="account-list">
      <!-- Account buttons populated by JS -->
    </div>
  </div>
  <div class="content" id="content">
    <h2>Select an account to view intelligence</h2>
  </div>
  <script>
    async function loadData() {
      const response = await fetch('./dashboard_multi_data.json');
      const data = await response.json();
      return data.accounts;
    }

    function renderAccount(accountData) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      // Header
      const header = document.createElement('h2');
      header.textContent = accountData.account;
      content.appendChild(header);

      // Last update
      const updatePara = document.createElement('p');
      updatePara.textContent = 'Last updated: ' + (accountData.last_update || 'N/A');
      content.appendChild(updatePara);

      // Metrics card
      const metricsCard = document.createElement('div');
      metricsCard.className = 'card';
      metricsCard.innerHTML = `
        <h3>Summary Metrics</h3>
        <p>Articles analysed: ${accountData.num_articles}</p>
        <p>Unique entities: ${accountData.num_entities}</p>
        <p>Intelligence gaps: ${accountData.num_intel_gaps}</p>
      `;
      content.appendChild(metricsCard);

      // Top entities card
      const entitiesCard = document.createElement('div');
      entitiesCard.className = 'card';
      entitiesCard.innerHTML = '<h3>Top Entities (Opportunities)</h3>';
      if (accountData.top_entities && accountData.top_entities.length > 0) {
        const ul = document.createElement('ul');
        accountData.top_entities.forEach(entity => {
          const li = document.createElement('li');
          li.textContent = `${entity.name} (${entity.count})`;
          ul.appendChild(li);
        });
        entitiesCard.appendChild(ul);
      } else {
        const p = document.createElement('p');
        p.textContent = 'No entities available.';
        entitiesCard.appendChild(p);
      }
      content.appendChild(entitiesCard);

      // Intel gaps card
      const gapsCard = document.createElement('div');
      gapsCard.className = 'card';
      gapsCard.innerHTML = '<h3>Intelligence Gaps</h3>';
      const gaps = accountData.intel_gaps || {};
      if (Object.keys(gaps).length > 0) {
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>Role</th><th>Suggested LinkedIn Search</th></tr>';
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        Object.entries(gaps).forEach(([role, query]) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${role}</td><td>${query}</td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        gapsCard.appendChild(table);
      } else {
        const p = document.createElement('p');
        p.textContent = 'No gaps detected.';
        gapsCard.appendChild(p);
      }
      content.appendChild(gapsCard);

      // Additional signals card
      function createSignalCard(title, items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${title}</h3>`;
        if (items && items.length > 0) {
          const ul = document.createElement('ul');
          items.forEach(item => {
            const li = document.createElement('li');
            // If item is an object with name/url/description, format it nicely
            if (typeof item === 'object') {
              const name = item.name || item.title || 'Item';
              const url = item.url || '#';
              const desc = item.description || item.summary || '';
              li.innerHTML = `<a href="${url}" target="_blank">${name}</a>` + (desc ? ` – ${desc}` : '');
            } else {
              li.textContent = item;
            }
            ul.appendChild(li);
          });
          card.appendChild(ul);
        } else {
          const p = document.createElement('p');
          p.textContent = 'No items found.';
          card.appendChild(p);
        }
        return card;
      }

      content.appendChild(createSignalCard('GitHub Repositories', accountData.github_repos));
      content.appendChild(createSignalCard('YouTube Videos', accountData.youtube_videos));
      content.appendChild(createSignalCard('Podcasts', accountData.podcasts));
      content.appendChild(createSignalCard('Case Studies', accountData.case_studies));
    }

    function initDashboard(accounts) {
      const listEl = document.getElementById('account-list');
      listEl.innerHTML = '';
      accounts.forEach((acc, index) => {
        const btn = document.createElement('button');
        btn.textContent = acc.account;
        btn.addEventListener('click', () => {
          // Remove active class from all buttons
          document.querySelectorAll('.account-list button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderAccount(acc);
        });
        listEl.appendChild(btn);
        // Automatically load the first account
        if (index === 0) {
          btn.classList.add('active');
          renderAccount(acc);
        }
      });
    }

    // Fetch dashboard data on page load
    loadData().then(initDashboard).catch(err => {
      const content = document.getElementById('content');
      content.innerHTML = '<p>Error loading data: ' + err + '</p>';
    });
  </script>
</body>
</html>
